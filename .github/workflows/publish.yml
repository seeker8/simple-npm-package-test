name: Publish Package to npmjs
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Use composite action
        id: composite-action
        uses: './.github/actions/my-composite-action'
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@seeker8'
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Display result
        run: echo 'Script Result:' ${{ steps.composite-action.outputs.result }}
