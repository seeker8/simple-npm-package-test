name: publish

on:
  workflow_dispatch: 

jobs:
  publish-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node Publishr
        uses: action/setup-node@v6
        with:
          node-version: 22
          registry-url: 'http://npm.pkg.githbu.com'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          npm ci
          npm publish
